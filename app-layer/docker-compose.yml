version: '3.8'

services:
  ipts-backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ../static:/app/static:ro
    env_file:
      - .env
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DB_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s