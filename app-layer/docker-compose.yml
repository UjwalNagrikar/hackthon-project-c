services:
  backend:
    build:
      context: .
      dockerfile: app-layer/Dockerfile
    container_name: app-layer-ipts-backend-1
    ports:
      - "5000:5000"
    environment:
      - DB_DIR=/app/data
    volumes:
      - ./app-layer/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s