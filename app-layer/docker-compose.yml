services:
  ipts-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-layer-ipts-backend-1
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ../static:/app/static:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s